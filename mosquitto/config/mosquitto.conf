# ---- Général ----
listener 1883
protocol mqtt

# ---- Authentification ----
allow_anonymous false
password_file /mosquitto/config/passwd

# ---- Persistance ----
persistence true
persistence_location /mosquitto/data/

# ---- Logs ----
log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true

# ---- Bridges et confs additionnelles ----
# Tout fichier .conf dans conf.d/ est inclus (ex. ttn-bridge.conf)
# Le fichier réel ttn-bridge.conf est gitignoré (contient une API key).
include_dir /mosquitto/config/conf.d
