# Conditional forwarding : déléguer la zone locale `.lan` et le reverse
# du subnet LAN au routeur (qui fait DHCP et connaît les hostnames).
# Pi-hole ne fait pas DHCP ici — sans ça il renvoie NXDOMAIN sur tout
# `*.lan` et les clients du LAN ne peuvent pas résoudre les hostnames
# courts les uns des autres.
#
# Déploiement : copier dans ./etc-dnsmasq.d/ (monté sur /etc/dnsmasq.d/
# du conteneur), remplacer <ROUTER_IP>/<LAN_CIDR>, puis voir le README
# pour les deux toggles Pi-hole v6 nécessaires (etc_dnsmasq_d et
# dns.domain.local).

server=/lan/<ROUTER_IP>
rev-server=<LAN_CIDR>,<ROUTER_IP>
