# Passé de 150 (défaut dnsmasq) à 300 le 2026-05-13.
# Logs Pi-hole montraient 17 warnings « Maximum number of concurrent
# DNS queries reached (max: 150) » en 5 semaines, avec un pic à 6 le
# jour même (corrélé à un restart du conteneur → cache miss massif).
# Unbound côté upstream tient sans pertes (overwritten=0, timed_out=0,
# cache hit 84 %) — le goulot était bien le plafond dnsmasq, pas la
# récursion. 300 = marge ~2× sans coût mémoire significatif sur Pi 3B.

dns-forward-max=300
